services:
  - type: web
    name: caldim-backend
    env: docker
    plan: free
    dockerCommand: "php -S 0.0.0.0:$PORT router.php"
    envVars:
      - key: DB_HOST
        value: "your_database_host"
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "caldim_careers"
      - key: DB_USER
        value: "your_user"
      - key: DB_PASS
        value: "your_password"
